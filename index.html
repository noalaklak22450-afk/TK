<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Official | Live Hub</title>
    <link rel="icon" type="image/png" href="image_077021.png">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
            background: #0b0f1a;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Liquid Glass Background --- */
        .background-blobs {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0b0f1a;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blue { width: 500px; height: 500px; background: #3b82f6; top: -10%; left: -10%; }
        .pink { width: 600px; height: 600px; background: #db2777; bottom: -10%; right: -5%; }
        .green { width: 400px; height: 400px; background: #10b981; bottom: 20%; left: 10%; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(60px, 40px); }
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo { display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .logo img { height: 40px; border-radius: 50%; }

        .nav-links { list-style: none; display: flex; gap: 20px; cursor: pointer; padding: 0; }
        .tab-link { opacity: 0.6; transition: 0.3s; font-size: 0.9rem; }
        .tab-link.active { opacity: 1; border-bottom: 2px solid white; }

        /* --- Content Layout --- */
        .content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .tab-content { display: none; width: 100%; max-width: 500px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* --- Media Components --- */
        .game-thumb { 
            width: 100%; 
            height: 180px; 
            border-radius: 18px; 
            object-fit: cover; 
            margin-bottom: 15px; 
            border: 1px solid var(--border);
            background: #1a1e2e; /* Placeholder color while loading */
        }

        .discord-thumb {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .discord-thumb:hover { transform: scale(1.02); border-color: #5865F2; }

        .glass-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: white;
            color: #0b0f1a;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #10b981; margin-right: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blue"></div>
        <div class="blob pink"></div>
        <div class="blob green"></div>
    </div>

    <nav>
        <div class="logo">
            <img src="image_077021.png" alt="TK Logo">
            <span>TK OFFICIAL</span>
        </div>
        <ul class="nav-links">
            <li class="tab-link active" onclick="openTab(event, 'home')">Home</li>
            <li class="tab-link" onclick="openTab(event, 'games')">Games</li>
            <li class="tab-link" onclick="openTab(event, 'discord')">Discord</li>
            <li class="tab-link" onclick="openTab(event, 'auth')">Account</li>
        </ul>
    </nav>

    <main class="content">
        <section id="home" class="tab-content active">
            <div class="glass-card">
                <h1>TK Official</h1>
                <p>Advanced Roblox services hub.</p>
                <button class="glass-btn" onclick="openTab(event, 'games')">Explore Games</button>
            </div>
        </section>

        <section id="games" class="tab-content">
            <div class="glass-card">
                <h2>Featured Game</h2>
                <a href="https://www.roblox.com/games/91624914286158/game" target="_blank" style="text-decoration:none; color:white;">
                    <img id="game-thumb-img" class="game-thumb" src="" alt="Loading Thumbnail...">
                    <h3>Hangout Follows</h3>
                    <p><span class="dot"></span> <span id="player-count">0</span> Active Players</p>
                </a>
            </div>
        </section>

        <section id="discord" class="tab-content">
            <div class="glass-card">
                <img src="image_0759d8.png" class="discord-thumb" alt="Discord Server Thumbnail">
                <h2>Join Our Discord</h2>
                <p>Support, bots, and community updates.</p>
                <a href="https://discord.gg/tkbots" target="_blank" class="glass-btn" style="background:#5865F2; color:white;">Join Server</a>
            </div>
        </section>

        <section id="auth" class="tab-content">
            <div class="glass-card">
                <h2 id="auth-title">Login</h2>
                <input type="text" id="user" placeholder="Username" style="width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,0.1); color:white;">
                <input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,0.1); color:white;">
                <button class="glass-btn" onclick="alert('Demo Login Only')">Submit</button>
            </div>
        </section>
    </main>

    <script>
        // Tab Switcher
        function openTab(evt, name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            if(evt) evt.currentTarget.classList.add('active');
        }

        // Live Roblox Fetching
        async function fetchRobloxData() {
            const placeId = "91624914286158";
            try {
                // Get Universe ID
                const universeRes = await fetch(`https://apis.roproxy.com/universes/v1/places/${placeId}/universe`);
                const universeData = await universeRes.json();
                const uId = universeData.universeId;

                // Get Player Count
                const gameRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${uId}`);
                const gameData = await gameRes.json();
                document.getElementById('player-count').innerText = gameData.data[0].playing.toLocaleString();

                // Get Game Thumbnail (Icon)
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${uId}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false`);
                const thumbData = await thumbRes.json();
                document.getElementById('game-thumb-img').src = thumbData.data[0].imageUrl;
            } catch (e) {
                console.error("API Error:", e);
                document.getElementById('player-count').innerText = "Offline";
            }
        }

        // Run on load
        fetchRobloxData();
        setInterval(fetchRobloxData, 30000); // Update every 30s
    </script>
</body>
</html>
