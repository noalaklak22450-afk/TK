<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Official | Roblox Services</title>
    <link rel="icon" type="image/png" href="image_077021.png">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.25);
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
            background: #0f172a;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Liquid Glass Background */
        .background-blobs {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0f172a;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.5;
            animation: move 20s infinite alternate;
        }

        .blue { width: 500px; height: 500px; background: #3b82f6; top: -10%; left: -10%; }
        .pink { width: 600px; height: 600px; background: #db2777; bottom: -10%; right: -5%; }
        .green { width: 400px; height: 400px; background: #10b981; bottom: 20%; left: 10%; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo { display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .logo img { height: 40px; border-radius: 50%; }

        .nav-links { list-style: none; display: flex; gap: 25px; cursor: pointer; }
        .tab-link { opacity: 0.6; transition: 0.3s; }
        .tab-link.active { opacity: 1; text-shadow: 0 0 10px white; border-bottom: 2px solid white; }

        .content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .tab-content { display: none; width: 100%; max-width: 500px; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        .glass-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: white;
            box-sizing: border-box;
        }

        .glass-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: white;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        /* Game Thumbnail Styling */
        .game-card {
            text-decoration: none;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .game-thumb {
            width: 100%;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #10b981; margin-right: 5px; }
        .toggle-text { cursor: pointer; font-size: 0.85rem; margin-top: 15px; opacity: 0.8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blue"></div>
        <div class="blob pink"></div>
        <div class="blob green"></div>
    </div>

    <nav>
        <div class="logo">
            <img src="image_077021.png" alt="TK Logo">
            <span>TK OFFICIAL</span>
        </div>
        <ul class="nav-links">
            <li class="tab-link active" onclick="openTab(event, 'home')">Home</li>
            <li class="tab-link" onclick="openTab(event, 'games')">Games</li>
            <li class="tab-link" onclick="openTab(event, 'discord')">Discord</li>
            <li class="tab-link" onclick="openTab(event, 'auth')">Account</li>
        </ul>
    </nav>

    <main class="content">
        <section id="home" class="tab-content active">
            <div class="glass-card">
                <h1>TK Official</h1>
                <p>Advanced Roblox services. Smooth. Liquid. Fast.</p>
                <button class="glass-btn" onclick="openTab(event, 'auth')">Get Started</button>
            </div>
        </section>

        <section id="games" class="tab-content">
            <div class="glass-card">
                <h2>Our Games</h2>
                <a href="https://www.roblox.com/games/91624914286158/game" target="_blank" class="game-card">
                    <img id="game-image" class="game-thumb" src="https://tr.rbxcdn.com/3093278635790666/150/150/Image/Png" alt="Game Thumbnail">
                    <h3>Hangout Follows</h3>
                    <p><span class="dot"></span> <span id="player-count">0</span> Players</p>
                </a>
            </div>
        </section>

        <section id="discord" class="tab-content">
            <div class="glass-card">
                <h2>Discord</h2>
                <p>Join our 24/7 support and community.</p>
                <a href="https://discord.gg/tkbots" target="_blank" style="text-decoration:none;">
                    <button class="glass-btn" style="background:#5865F2; color:white;">Join Server</button>
                </a>
            </div>
        </section>

        <section id="auth" class="tab-content">
            <div class="glass-card">
                <h2 id="auth-title">Login</h2>
                <input type="text" id="user" placeholder="Username" class="glass-input">
                <input type="password" id="pass" placeholder="Password" class="glass-input">
                <button class="glass-btn" onclick="runAuth()">Submit</button>
                <p onclick="toggleAuth()" class="toggle-text">Need an account? <span>Sign Up</span></p>
            </div>
        </section>
    </main>

    <script>
        // TAB LOGIC
        function openTab(evt, name) {
            const tabs = document.querySelectorAll('.tab-content');
            const links = document.querySelectorAll('.tab-link');
            tabs.forEach(t => t.classList.remove('active'));
            links.forEach(l => l.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            if(evt) evt.currentTarget.classList.add('active');
        }

        // AUTH LOGIC
        function toggleAuth() {
            const title = document.getElementById('auth-title');
            title.innerText = (title.innerText === "Login") ? "Sign Up" : "Login";
        }

        function runAuth() {
            const mode = document.getElementById('auth-title').innerText;
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(!u || !p) return alert("Fill all fields!");

            let users = JSON.parse(localStorage.getItem('tk_users') || "[]");

            if(mode === "Sign Up") {
                if(users.find(x => x.u === u)) return alert("User exists!");
                users.push({u, p});
                localStorage.setItem('tk_users', JSON.stringify(users));
                alert("Account Created! Now please Login.");
                toggleAuth();
            } else {
                const found = users.find(x => x.u === u && x.p === p);
                if(found) {
                    alert("Logged in as " + u);
                    openTab(null, 'home');
                } else {
                    alert("Wrong details!");
                }
            }
        }

        // ROBLOX DATA
        async function fetchRoblox() {
            const pid = "91624914286158";
            try {
                const res = await fetch(`https://apis.roproxy.com/universes/v1/places/${pid}/universe`);
                const data = await res.json();
                const gameRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${data.universeId}`);
                const gameData = await gameRes.json();
                document.getElementById('player-count').innerText = gameData.data[0].playing;
                
                // Fetch Thumbnail
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${data.universeId}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false`);
                const thumbData = await thumbRes.json();
                document.getElementById('game-image').src = thumbData.data[0].imageUrl;
            } catch(e) { console.log("API Error"); }
        }

        fetchRoblox();
        setInterval(fetchRoblox, 60000);
    </script>
</body>
</html>
